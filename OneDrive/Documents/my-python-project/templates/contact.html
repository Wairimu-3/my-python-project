<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | CFF Juja Farm</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Font Awesome for icons -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

    <!-- Navigation / Header -->
<header>
    <div class="logo">
        <img src="/static/images/logo.jpg" alt="CFF Logo">
    </div>
    <nav>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/ministries">Ministries</a></li>
            <li><a href="/sermons">Sermons</a></li>
            <li><a href="/contact">Contact</a></li>
        </ul>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
    </nav>
</header>

    <!-- Contact Section -->
<section class="contact-details">
    <div class="container contact-container">

        <!-- Google Map -->
        <div class="map">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3988.9957704190597!2d37.084578!3d-1.1634552!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x182f4300668bae8b%3A0x8a86576ddf099abc!2sCFF%20JUJAFARM%20Church!5e0!3m2!1sen!2ske!4v1771055043265!5m2!1sen!2ske" 
                width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>

        <!-- Contact Info & Form -->
        <div class="contact-info-form">

            <!-- Social Media Grid -->
            <div class="contact-social-grid">
                <a href="https://www.facebook.com/share/1KQ1SZ38zS/" target="_blank" class="social-btn facebook">
                    <i class="fab fa-facebook-f"></i> Facebook
                </a>
                <a href="https://youtube.com/@cfoundationfellowship?feature=shared" target="_blank" class="social-btn youtube">
                    <i class="fab fa-youtube"></i> YouTube
                </a>
                <a href="https://www.instagram.com/cff_jujafarm" target="_blank" class="social-btn instagram">
                    <i class="fab fa-instagram"></i> Instagram
                </a>
                <a href="https://www.tiktok.com/@cff.jujafarm" target="_blank" class="social-btn tiktok">
                    <i class="fab fa-tiktok"></i> TikTok
                </a>
            </div>

            <!-- Contact Info Box -->
<div class="contact-info">
    <h3>Contact Information</h3>

    <div class="info-item">
        <i class="fas fa-map-marker-alt"></i>
        <p><a href="https://maps.app.goo.gl/hjKTEPokBd4jhNh98" target="_blank">CFF Juja Farm, Juja, Kenya</a></p>
    </div>

    <div class="info-item">
        <i class="fas fa-envelope"></i>
        <p><a href="mailto:cfoundationfellowship@gmail.com">cfoundationfellowship@gmail.com</a></p>
    </div>

    <div class="info-item">
        <i class="fas fa-phone-alt"></i>
        <p><a href="tel:+254700000000">+254 700 000 000</a></p>
    </div>
</div>

            <!-- Contact Form -->
            <div class="contact-form">
                <h3>Send Us a Message</h3>
                <form method="POST" action="{{ url_for('contact') }}">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" required>
                    
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" placeholder="Your Email" required>
                    
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Your Message" required></textarea>
                    
                    <button type="submit" class="btn">Send Message</button>
                </form>
            </div>

        </div>
    </div>
</section>

    <!-- Footer -->
<footer>
       <p class="footer-verse">
            © 2026 Christian Foundation Fellowship Juja Farm
        </p>
</footer>

<script>
function toggleMenu() {
    document.querySelector(".nav-links").classList.toggle("show");
}
</script>
</body>
</html>
