<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Message Sent | CFF Juja Farm</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="images/logo.jpg" alt="CFF Logo">
        </div>
    </header>

    <main class="contact-success">
        <section>
            <h2>Thank You, {{ name }}!</h2>
            <p>Your message has been sent successfully. We will get back to you as soon as possible.</p>
            <a href="/" class="btn">Back to Home</a>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Christian Foundation Fellowship Juja Farm</p>
    </footer>
    <button id="backToTop" title="Go to top">↑</button>
    <script>
let backToTop = document.getElementById("backToTop");

window.onscroll = function() {
    if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
        backToTop.style.display = "block";
    } else {
        backToTop.style.display = "none";
    }
};

backToTop.onclick = function() {
    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
};
</script>
</body>
</html>
